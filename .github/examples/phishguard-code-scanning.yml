name: PhishGuard URL Scan

on:
  push:
    paths:
      - "security/urls.txt"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check out PhishGuard
        uses: actions/checkout@v5
        with:
          repository: omobolajiadeyan/phishguard-ai
          path: .phishguard

      - name: Generate SARIF report
        run: >-
          python .phishguard/phishguard.py batch security/urls.txt
          --format sarif
          --output phishguard.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phishguard.sarif
          category: phishguard-url-scan
